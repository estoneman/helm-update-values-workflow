name: Update values.yaml from routes
on:
  push:
    branches: [ main ]
    paths:
      - 'routes/**'
  workflow_dispatch:
jobs:
  update-values:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: install dependencies
        run: |
          npm -g install js-yaml
      - name: show available modules
        run: |
          npm -g ls
      - name: generate values.yaml from routes
        run: |
          #!/bin/bash
          cat > routes/values.yaml << 'EOF'
          # this file is auto-generated from routes/ directory
          # do not edit manually - changes will be overwritten
          routes:
          EOF

          echo 'processing route files...'
          for file in routes/*.json; do
            if [ -f "$file" ]; then
              filename=$(basename "$file" .json)
              echo " processing: $filename"

              echo "  $filename: |" >> routes/values.yaml
              cat "$file" | sed 's/^/    /' >> routes/values.yaml
              echo '' >> routes/values.yaml
            fi
          done

          echo "generated routes/values.yaml with $(ls routes/*.json | wc -l) routes"
          cat routes/values.yaml
      - name: check for changes
        id: git-check
        run: |
          cat routes/values.yaml
          git diff --exit-code routes/values.yaml || echo 'changed=true' >> $GITHUB_OUTPUT
      - name: commit and push changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.email 'action@github.com'
          git config --local user.name 'GitHub Action'
          git add routes/values.yaml
          git commit -m 'auto-update routes/values.yaml from route files [skip ci]'
          git push
      - name: no changes detected
        if: steps.git-check.outputs.changed != 'true'
        run: |
          echo 'no changes detected in routes. routes/values.yaml is up to date.'
