name: Update values.yaml from routes
on:
  push:
    branches: [ dev ]
    paths:
      - 'routes/**'
  workflow_dispatch:
jobs:
  update-values:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: install dependencies
        run: |
          sudo apt-get install -y jq
      - name: mark generation script as executable
        run: chmod u+x generate_routes.sh
      - name: generate values.yaml from routes
        run: |
          ./generate_routes.sh
      - name: check for changes
        id: git-check
        run: |
          git diff --exit-code routes/values.yaml || echo 'changed=true' >> $GITHUB_OUTPUT
      - name: commit and push changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.email 'action@github.com'
          git config --local user.name 'GitHub Action'
          git add routes/values.yaml
          git commit -m 'auto-update routes/values.yaml from route files [skip ci]'
          git push
      - name: no changes detected
        if: steps.git-check.outputs.changed != 'true'
        run: |
          echo 'no changes detected in routes. routes/values.yaml is up to date.'
