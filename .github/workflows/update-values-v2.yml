name: Update values.yaml from routes

on:
  push:
    branches: [ main ]
    paths:
      - 'cidm/dev/routes/**'
      - 'cidm/test/routes/**'
      - 'cidm/prod/routes/**'
      - '!**/values.yaml'
  workflow_dispatch:

jobs:
  update-values:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # - name: Install dependencies
      #   run: |
      #     sudo apt-get update -y
      #     sudo apt-get install -y jq

      - name: Mark generation script as executable
        run: chmod u+x generate_routes.sh

      - name: Generate values.yaml files from route directories
        run: |
          set -euo pipefail

          ./generate_routes.sh cidm/dev
          ./generate_routes.sh cidm/test
          ./generate_routes.sh cidm/prod

      - name: Check for changed values.yaml files
        id: git-check
        run: |
          set -euo pipefail

          changed_files=()

          for file in \
            cidm/dev/routes/values.yaml \
            cidm/test/routes/values.yaml \
            cidm/prod/routes/values.yaml
          do
            if ! git diff --quiet -- "$file"; then
              changed_files+=("$file")
            fi
          done

          if [ ${#changed_files[@]} -gt 0 ]; then
            {
              echo "changed=true"
              echo "files<<EOF"
              printf '%s\n' "${changed_files[@]}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changed values.yaml files
        if: steps.git-check.outputs.changed == 'true'
        run: |
          set -euo pipefail

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          echo 'detected changes in the following files:'
          echo ${{ steps.git-check.outputs.files }}
          while IFS= read -r file; do
            [ -n "$file" ] && git add "$file"
          done <<EOF
          ${{ steps.git-check.outputs.files }}
          EOF

          git commit -m "auto-update route values.yaml files from route files [skip ci]"
          git push

      - name: No changes detected
        if: steps.git-check.outputs.changed != 'true'
        run: |
          echo "No changes detected. values.yaml files are already up to date."
